[uwsgi]
http = 0.0.0.0:8000
module = conf.wsgi
strict = true
master = true
enable-threads = true
thunder-lock = true                  ; serialize accept() when using threads
vacuum = true                        ; Delete sockets during shutdown
single-interpreter = true
die-on-term = true                   ; Shutdown when receiving SIGTERM (default is respawn)
need-app = true

; 2 CPU / 4 GB RAM: 2 workers (1 per core), 2 threads each → 4 concurrent requests
processes = 2
threads = 2
listen = 128                         ; backlog queue for burst traffic

disable-logging = true               ; Disable built-in logging
log-maxsize = 200000000
log-4xx = true                       ; but log 4xx's anyway
log-5xx = true                       ; and 5xx's

harakiri = 60                        ; forcefully kill workers after 60 seconds
limit-as = 1024                      ; 1 GB virtual memory per worker
buffer-size = 32768                  ; larger request headers/body buffer

max-requests = 1000                  ; Restart workers after this many requests
max-worker-lifetime = 3600           ; Restart workers after this many seconds
reload-on-rss = 512                  ; Restart workers after 512 MB RSS (~1 GB for 2 workers)
worker-reload-mercy = 60             ; How long to wait before forcefully killing workers
